<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0A0A0A"/>
  <!-- V shape = VIP + Road -->
  <g transform="translate(2, 4)">
    <!-- Left stroke of V -->
    <polygon points="14,18 4,2 8,2 14,12" fill="#C8A951"/>
    <!-- Right stroke of V -->
    <polygon points="14,18 24,2 20,2 14,12" fill="#C8A951" opacity="0.7"/>
    <!-- Gold crown/diamond at top -->
    <polygon points="14,0 17,5 14,8 11,5" fill="#C8A951"/>
    <!-- Gold bar at bottom -->
    <rect x="6" y="18" width="16" height="3" rx="1" fill="#C8A951"/>
  </g>
</svg>
