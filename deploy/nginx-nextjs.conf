server {
    listen 80;
    server_name vipluxurycarrental.com www.vipluxurycarrental.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name vipluxurycarrental.com www.vipluxurycarrental.com;

    ssl_certificate /etc/letsencrypt/live/vipluxurycarrental.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vipluxurycarrental.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/vipluxurycarrental.com/chain.pem;

    access_log /var/log/nginx/vipluxurycarrental.com.access.log;
    error_log /var/log/nginx/vipluxurycarrental.com.error.log;

    location /_next/static/ {
        alias /var/www/nextjs/.next/static/;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /public/ {
        alias /var/www/nextjs/public/;
        expires 30d;
    }

    location /api/images/ {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 30d;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
